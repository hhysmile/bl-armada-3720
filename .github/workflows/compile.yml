name: Online Compile Armada 3720 Bin

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install dependencies and cross-compilers
      run: |
        sudo apt-get update
        sudo apt-get install -y git make gcc bison flex libssl-dev device-tree-compiler swig libpython3-dev bc
        # 安装官方推荐的 32位 编译器
        sudo apt-get install -y gcc-arm-linux-gnueabi gcc-aarch64-linux-gnu

    - name: Set Permanent Environment Variables
      run: |
        # 使用 GitHub Actions 官方最高级别的全局环境变量注入，穿透一切子 make
        echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
        echo "CROSS_CM3=/usr/bin/arm-linux-gnueabi-" >> $GITHUB_ENV

    - name: Compile Code
      run: |
        # 双重保险：在当前 shell 再次声明
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_CM3=/usr/bin/arm-linux-gnueabi-
        
        if [ -f "Makefile" ]; then
          # 1. 尝试生成配置
          make mvebu_espressobin-88f3720_defconfig || make defconfig || true
          
          # 2. 编译，并在命令行、环境变量里三重强制透传
          make -j$(nproc) CROSS_COMPILE=aarch64-linux-gnu- CROSS_CM3=/usr/bin/arm-linux-gnueabi-
        fi

    - name: Find and Collect Bin Files
      run: |
        mkdir output
        find . -name "*.bin" -exec cp {} ./output/ \;
        ls -la ./output/

    - name: Upload Bin Artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-bin-files
        path: ./output/
