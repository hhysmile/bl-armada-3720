name: Online Compile Armada 3720 Bin

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install dependencies and cross-compilers
      run: |
        sudo apt-get update
        sudo apt-get install -y git make gcc bison flex libssl-dev device-tree-compiler swig libpython3-dev bc
        sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: Compile Code
      run: |
        # 自动获取 arm-linux-gnueabi- 的绝对路径前缀
        CM3_PATH=$(which arm-linux-gnueabi-gcc | sed 's/gcc$//')
        
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_CM3=$CM3_PATH
        
        echo "Using CROSS_CM3=$CROSS_CM3"
        
        if [ -f "Makefile" ]; then
          # 尝试匹配 espressobin 的默认配置，如果没有则用默认配置
          make mvebu_espressobin-88f3720_defconfig || make defconfig || true
          make -j$(nproc)
        fi

    - name: Find and Collect Bin Files
      run: |
        mkdir output
        # 自动搜寻编译出来的所有 .bin 文件（包括 flash-image.bin 等）
        find . -name "*.bin" -exec cp {} ./output/ \;
        ls -la ./output/

    - name: Upload Bin Artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-bin-files
        path: ./output/
