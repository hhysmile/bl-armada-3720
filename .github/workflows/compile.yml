name: Online Compile Armada 3720 Bin

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install dependencies and cross-compilers
      run: |
        sudo apt-get update
        sudo apt-get install -y git make gcc bison flex libssl-dev device-tree-compiler swig libpython3-dev bc
        # 安装 64位 和 32位 交叉编译器
        sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: Create Toolchain Alias (Fix Hardcoded CROSS_CM3)
      run: |
        # 核心修复：因为仓库源码硬编码了 arm-none-linux-gnueabihf-
        # 我们在系统 /usr/bin 下为现有的 arm-linux-gnueabi- 建立对应名字的软链接
        sudo ln -s /usr/bin/arm-linux-gnueabi-gcc /usr/bin/arm-none-linux-gnueabihf-gcc
        sudo ln -s /usr/bin/arm-linux-gnueabi-ld /usr/bin/arm-none-linux-gnueabihf-ld
        sudo ln -s /usr/bin/arm-linux-gnueabi-objcopy /usr/bin/arm-none-linux-gnueabihf-objcopy
        
        # 测试软链接是否生效
        arm-none-linux-gnueabihf-gcc --version

    - name: Compile Code
      run: |
        # 直接执行主 Makefile，它会自动处理 catdrive.config 并调用后续编译
        if [ -f "Makefile" ]; then
          make -j$(nproc)
        fi

    - name: Find and Collect Bin Files
      run: |
        mkdir output
        # 寻找最终生成的 flash-image.bin 或 fip.bin 并复制出来
        find . -name "*.bin" -exec cp {} ./output/ \;
        ls -la ./output/

    - name: Upload Bin Artifact
      uses: actions/upload-artifact@v4
      with:
        name: catdrive-armada3720-bin
        path: ./output/
