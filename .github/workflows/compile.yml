name: Online Compile Armada 3720 Bin

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install dependencies and cross-compilers
      run: |
        sudo apt-get update
        sudo apt-get install -y git make gcc bison flex libssl-dev device-tree-compiler swig libpython3-dev bc
        sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: Compile Code
      run: |
        # 1. 显式定义 32位 编译器的绝对路径前缀
        CM3_PATH="/usr/bin/arm-linux-gnueabi-"
        
        # 2. 设置全局环境变量（作为双重保险）
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_CM3=$CM3_PATH
        
        # 3. 执行编译
        # 核心改动：把 CROSS_COMPILE 和 CROSS_CM3 直接当做参数传给 make 命令
        if [ -f "Makefile" ]; then
          make mvebu_espressobin-88f3720_defconfig CROSS_COMPILE=aarch64-linux-gnu- CROSS_CM3=$CM3_PATH || make defconfig CROSS_COMPILE=aarch64-linux-gnu- CROSS_CM3=$CM3_PATH || true
          
          # 在最终编译时强制透传这两个变量
          make -j$(nproc) CROSS_COMPILE=aarch64-linux-gnu- CROSS_CM3=$CM3_PATH
        fi

    - name: Find and Collect Bin Files
      run: |
        mkdir output
        # 自动搜寻编译出来的所有 .bin 文件（包括 flash-image.bin 等）
        find . -name "*.bin" -exec cp {} ./output/ \;
        ls -la ./output/

    - name: Upload Bin Artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-bin-files
        path: ./output/
