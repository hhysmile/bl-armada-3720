name: Online Compile Armada 3720 Bin

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install dependencies and cross-compilers
      run: |
        sudo apt-get update
        sudo apt-get install -y git make gcc bison flex libssl-dev device-tree-compiler swig libpython3-dev bc
        # 安装官方默认的 64位 和 32位 交叉编译器
        sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: Link Full Toolchain (Fix Hardcoded CROSS_CM3)
      run: |
        # 批量为 32位 工具链创建全套软链接，确保底层的 wtmi 和 fuse 编译脚本在调用任何命令时都不会漏空
        for cmd in gcc g++ ld as objcopy objdump strip ar ranlib size nm cppg; do
          if [ -f "/usr/bin/arm-linux-gnueabi-$cmd" ]; then
            sudo ln -sf "/usr/bin/arm-linux-gnueabi-$cmd" "/usr/bin/arm-none-linux-gnueabihf-$cmd"
          fi
        done
        
        # 验证软链接是否全面生效
        arm-none-linux-gnueabihf-gcc --version

    - name: Compile Code
      run: |
        # 直接运行主 Makefile
        if [ -f "Makefile" ]; then
          make -j$(nproc)
        fi

    - name: Find and Collect Bin Files
      run: |
        mkdir output
        # 寻找最终生成的镜像产物并复制
        find . -name "*.bin" -exec cp {} ./output/ \;
        ls -la ./output/

    - name: Upload Bin Artifact
      uses: actions/upload-artifact@v4
      with:
        name: catdrive-armada3720-bin
        path: ./output/
